# Blueprint Render pour ChurchHub (https://render.com)
# Déploie : PostgreSQL + API Django + frontend Next.js
#
# IMPORTANT : les URL onrender.com ci-dessous supposent que les noms de service
# "churchhub-api" et "churchhub-web" sont disponibles. Si Render leur attribue un
# suffixe (nom déjà pris), mettez à jour NEXT_PUBLIC_API_URL, NEXT_PUBLIC_MEDIA_URL,
# CORS_ALLOWED_ORIGINS et CSRF_TRUSTED_ORIGINS avec les vraies URL, puis redéployez.

databases:
  - name: churchhub-db
    databaseName: churchhub
    user: churchhub
    plan: free

services:
  # -------------------------------------------------------------- API Django
  - type: web
    name: churchhub-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate && python manage.py seed"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    healthCheckPath: /api/docs/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: churchhub-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://churchhub-web.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://churchhub-web.onrender.com"
      - key: TIME_ZONE
        value: "Africa/Kinshasa"
      - key: DEFAULT_CURRENCY
        value: "CDF"

  # ----------------------------------------------------------- Frontend Next.js
  - type: web
    name: churchhub-web
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: "npm install --legacy-peer-deps && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: NODE_VERSION
        value: "22.13.0"
      - key: NEXT_PUBLIC_API_URL
        value: "https://churchhub-api.onrender.com/api"
      - key: NEXT_PUBLIC_MEDIA_URL
        value: "https://churchhub-api.onrender.com"
